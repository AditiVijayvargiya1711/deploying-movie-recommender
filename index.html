<!DOCTYPE html>
<html>
<head>
  <title>Movie Recommender</title>
  <style>
    img { width:120px; height:200px; border-radius:6px; margin:5px; }
    
  </style>
  <link rel="stylesheet" href="/static/html.css">
</head>
<body>
<div id="main">
<div id="heading">Movie Recommender System!!!</div><hr>
<div>Let us know how to contact you?</div><br>
<input id="movie" placeholder="Enter movie, Ex.: Aliens , Home , Ri¢hie Ri¢h etc.">
<button onclick="getRecommendations()">Recommend</button>

<div id="output"></div>
</div>

<script>
const TMDB_KEY = "415510d87ce78e8a9a2f04ee118af6d2"; 


async function fetchPoster(title) {
  const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`);
  const data = await res.json();
  if (data.results.length > 0 && data.results[0].poster_path) {
    return "https://image.tmdb.org/t/p/w500" + data.results[0].poster_path;
  }
  return null;
}

async function getRecommendations() {
  const movie = document.getElementById('movie').value;
  const res = await fetch(`/recommend/${movie}`);
  const data = await res.json();

  const box = document.getElementById('output');
  box.innerHTML = "";

  for (const title of data.recommendations) {
    const poster = await fetchPoster(title);
    box.innerHTML += `
      <div class="boxes">
        <div class="title_name">${title}</div><br>
        ${poster ? `<img src="${poster}" />` : "No poster found 😕"}
      </div>`;
  }
}
</script>

</body>
</html>
